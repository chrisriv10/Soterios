<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 360px; font: 13px/1.4 system-ui, -apple-system, Segoe UI, Roboto; color: #1f2328; background: #fff; }
    .header { display: flex; align-items: center; gap: 10px; padding: 16px; background: #f6f8fa; border-bottom: 1px solid #d0d7de; }
    .header img { width: 32px; height: 32px; }
    .header h1 { font-size: 15px; font-weight: 600; }
    .section { padding: 16px; border-bottom: 1px solid #d0d7de; }
    .section:last-child { border-bottom: none; }
    .label { font-size: 11px; font-weight: 600; text-transform: uppercase; color: #656d76; margin-bottom: 8px; }
    .input-group { display: flex; gap: 8px; }
    input[type="password"] { flex: 1; padding: 8px 12px; border: 1px solid #d0d7de; border-radius: 6px; font: inherit; }
    input[type="password"]:focus { outline: none; border-color: #0969da; box-shadow: 0 0 0 3px rgba(9,105,218,0.3); }
    .btn { padding: 8px 16px; border: none; border-radius: 6px; font: inherit; font-weight: 500; cursor: pointer; }
    .btn-primary { background: #0969da; color: white; }
    .btn-primary:hover { background: #0860ca; }
    .btn-primary:disabled { background: #94bcee; cursor: not-allowed; }
    .result { margin-top: 12px; padding: 12px; border-radius: 6px; display: none; }
    .result.safe { background: #f0fdf4; border: 1px solid #86efac; color: #166534; }
    .result.pwned { background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; }
    .result-title { font-weight: 600; margin-bottom: 4px; }
    .result-detail { font-size: 12px; opacity: 0.8; }
    .settings-link { display: block; text-align: center; padding: 12px; color: #0969da; text-decoration: none; font-size: 12px; }
    .settings-link:hover { text-decoration: underline; }
    .status { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #656d76; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #28a745; }
    .status-dot.offline { background: #dc3545; }
    .loading { display: none; }
    .loading.active { display: inline-block; width: 16px; height: 16px; border: 2px solid #d0d7de; border-top-color: #0969da; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon32.png" alt="">
    <h1>Soterios Credential Safety</h1>
  </div>

  <div class="section">
    <div class="label">Check a Password</div>
    <div class="input-group">
      <input type="password" id="passwordInput" placeholder="Enter password to check" autocomplete="off">
      <button class="btn btn-primary" id="checkBtn"><span class="loading" id="loader"></span> Check</button>
    </div>
    <div class="result" id="result"></div>
  </div>

  <div class="section">
    <div class="label">Desktop App</div>
    <div class="status">
      <span class="status-dot offline" id="statusDot"></span>
      <span id="statusText">Checking connection...</span>
    </div>
  </div>

  <a class="settings-link" href="#" id="openOptions">Settings</a>

  <script src="popup.js"></script>
</body>
</html>
