<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; img-src 'self';" />
  <title>Soterios</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0e1117;
      color: #e6eaf0;
      font-family: -apple-system, "Segoe UI", Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    .splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .splash img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      animation: pulse 1.6s ease-in-out infinite;
    }

    .splash-title {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .splash-sub {
      font-size: 0.8rem;
      color: #8b95a5;
      margin-top: -8px;
    }

    .loading-bar {
      width: 180px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
      margin-top: 4px;
    }

    .loading-bar-fill {
      height: 100%;
      width: 40%;
      border-radius: 2px;
      background: #6366f1;
      animation: slide 1.3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.75; transform: scale(0.96); }
    }

    @keyframes slide {
      0% { transform: translateX(-120%); }
      50% { transform: translateX(60%); }
      100% { transform: translateX(220%); }
    }
  </style>
</head>
<body>
  <div class="splash">
    <img src="../../../assets/icon.png" alt="Soterios" />
    <div class="splash-title">Soterios</div>
    <div class="splash-sub">Starting up&hellip;</div>
    <div class="loading-bar"><div class="loading-bar-fill"></div></div>
  </div>
</body>
</html>
